    tags: ["Google ranking", "local SEO", "small business SEO", "visibility"],
    content: `<p>You've built a website. You've been in business for years. Your work is excellent. And yet — when a potential customer searches for what you do in your city, you're nowhere to be found on Google.</p><p>You're not alone. This is one of the most common frustrations we hear from small business owners. The good news: in most cases, the reason is fixable.</p><h2>1. Google Doesn't Know What You Do</h2><p>Your website has a homepage that says "Welcome to [Business Name]" — and not much else that Google can use to understand your services.</p><p>Google reads your website like a document. If the words describing your service and city aren't clearly and repeatedly present on your site, Google won't associate you with those searches.</p><p><strong>Fix it:</strong> Every page on your site should clearly state what you do, where you do it, and for whom. Your homepage H1 shouldn't be your business name — it should be your service and location.</p><h2>2. You Have One Page Trying to Rank for Everything</h2><p>A single homepage cannot rank for multiple service and location variations all at once. Each of those searches needs its own dedicated page to rank well.</p><p><strong>Fix it:</strong> Create individual service pages for each thing you offer, and individual location pages for each area you serve. More targeted pages = more chances to show up.</p><h2>3. Your Google Business Profile Is Incomplete</h2><p>Google Business Profile is one of the most powerful free tools available to local businesses — and most are barely using it. Fill in every field completely, add photos, collect reviews, post updates regularly.</p><h2>4. Your Website Is Too Slow</h2><p>Google uses page speed as a ranking factor. If your website takes more than 3 seconds to load on mobile, you're being penalized. Run your site through Google's free PageSpeed Insights tool.</p><h2>5. Nobody Links to You</h2><p>Links from other websites to yours are still one of Google's most important ranking signals. Start with local directories, chambers of commerce, local news sites, and industry associations.</p>`

    "headline": post.title,
    "description": post.metaDesc,
    "author": { "@type": "Organization", "name": post.author, "url": "https://www.menipages.com" },
    "publisher": { "@type": "Organization", "name": "MeniPages", "url": "https://www.menipages.com" },
    "datePublished": post.date,
    "dateModified": post.date,
    "mainEntityOfPage": { "@type": "WebPage", "@id": `https://www.menipages.com/blog/${post.slug}` },
    "keywords": post.tags.join(', '),
    "articleSection": post.category
  };
  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.textContent = JSON.stringify(schema);
  document.head.appendChild(s);

  // Breadcrumb schema
  const bc = {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://www.menipages.com/" },
      { "@type": "ListItem", "position": 2, "name": "Blog", "item": "https://www.menipages.com/blog" },
      { "@type": "ListItem", "position": 3, "name": post.title, "item": `https://www.menipages.com/blog/${post.slug}` }
    ]
  };
  const bs = document.createElement('script');
  bs.type = 'application/ld+json';
  bs.textContent = JSON.stringify(bc);
  document.head.appendChild(bs);
}

function buildTOC(contentHTML) {
  const div = document.createElement('div');
  div.innerHTML = contentHTML;
  const headings = div.querySelectorAll('h2');
  if (!headings.length) return '';
  let items = '';
  headings.forEach((h, i) => {
    const id = `section-${i}`;
    h.id = id;
    items += `<li><a href="#${id}">${h.textContent}</a></li>`;
  });
  return { html: div.innerHTML, toc: items };
}

function renderPost(post) {
  setMeta(post);
  const { html: processedContent, toc } = buildTOC(post.content);
  const authorInitials = post.author.split(' ').map(w => w[0]).join('').slice(0,2);

  const wrap = document.getElementById('article-wrap');
  wrap.innerHTML = `
    <article itemscope itemtype="https://schema.org/Article">
      <header class="article-hero">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="index.html">Home</a>
          <span class="breadcrumb-sep">›</span>
          <a href="blog.html">Blog</a>
          <span class="breadcrumb-sep">›</span>
          <span aria-current="page">${post.category}</span>
        </nav>
        <span class="post-cat-badge">${post.category}</span>
        <h1 class="article-title" itemprop="headline">${post.title}</h1>
        <div class="article-meta">
          <div class="meta-author">
            <div class="author-avatar" aria-hidden="true">${authorInitials}</div>
            <span itemprop="author">${post.author}</span>
          </div>
          <span class="meta-sep"></span>
          <time datetime="${post.date}" itemprop="datePublished">${formatDate(post.date)}</time>
          <span class="meta-sep"></span>
          <span>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${post.readTime}
          </span>
        </div>
      </header>

      <div class="article-layout">
        <div>
          <div class="article-content" itemprop="articleBody">${processedContent}</div>
          <div class="post-tags">
            ${post.tags.map(t => `<span class="post-tag">${t}</span>`).join('')}
          </div>
          <div class="article-cta">
            <h3>Ready to Rank on Google?</h3>
            <p>We'll build hundreds of pages like this for your business — fully done for you, in 3 weeks.</p>
            <a href="index.html#pricing" class="btn-primary">View Plans &amp; Pricing →</a>
          </div>
        </div>
        <aside class="toc-sticky" aria-label="Table of contents">
          ${toc ? `<div class="toc-block"><p class="toc-title">In This Article</p><ul class="toc-list">${toc}</ul></div>` : ''}
          <div class="share-block">
            <p class="share-title">Share This Article</p>
            <div class="share-btns">
              <a class="share-btn" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(post.title)}&url=${encodeURIComponent('https://www.menipages.com/blog/'+post.slug)}" target="_blank" rel="noopener">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>
                Share on X
              </a>
              <a class="share-btn" href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent('https://www.menipages.com/blog/'+post.slug)}" target="_blank" rel="noopener">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
                Share on LinkedIn
              </a>
            </div>
          </div>
        </aside>
      </div>
    </article>

    <section class="related-section" aria-label="Related articles">
      <h2 class="related-title">More From The Blog</h2>
      <div class="related-grid" id="related-grid"></div>
    </section>`;

  // Related posts
  const related = window.BLOG_POSTS.filter(p => p.slug !== post.slug).slice(0, 3);
  const relGrid = document.getElementById('related-grid');
  related.forEach(p => {
    const card = document.createElement('a');
    card.href = `blog-post.html?slug=${p.slug}`;
    card.className = 'related-card';
    card.innerHTML = `<p class="related-cat">${p.category}</p><h4>${p.title}</h4><p>${p.readTime}</p>`;
    relGrid.appendChild(card);
  });
}

function renderError() {
  document.getElementById('article-wrap').innerHTML = `
    <div class="error-state">
      <h1>Post Not Found</h1>
      <p>That article doesn't exist. Browse all our posts on the blog.</p>
      <a href="blog.html" class="btn-primary">← Back to Blog</a>
    </div>`;
}

// BOOT
const slug = getSlugFromURL();
const post = window.BLOG_POSTS.find(p => p.slug === slug);
if (post) renderPost(post);
else renderError();

// Reading progress bar
window.addEventListener('scroll', () => {
  const scrollTop = document.documentElement.scrollTop;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  document.getElementById('read-progress').style.width = progress + '%';
});

// TOC active highlight
const tocLinks = document.querySelectorAll('.toc-list a');
if (tocLinks.length) {
  window.addEventListener('scroll', () => {
    const sections = document.querySelectorAll('.article-content h2[id]');
    let current = '';
    sections.forEach(s => {
      if (window.scrollY >= s.offsetTop - 120) current = s.id;
    });
    tocLinks.forEach(a => {
      a.classList.toggle('active', a.getAttribute('href') === `#${current}`);
    });
  });
}
</script>
</body>
</html>
